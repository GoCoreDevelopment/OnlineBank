<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bank App</title>
  <!-- Tailwind CSS CDN -->
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <!-- React и ReactDOM CDN -->
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <!-- React Router CDN -->
  <script src="https://cdn.jsdelivr.net/npm/react-router-dom@6.26.2/dist/umd/react-router-dom.min.js"></script>
  <!-- Axios CDN -->
  <script src="https://cdn.jsdelivr.net/npm/axios@1.7.7/dist/axios.min.js"></script>
  <!-- Babel для JSX -->
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.25.7/babel.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    // Отладка загрузки
    console.log('React:', typeof React);
    console.log('ReactDOM:', typeof ReactDOM);
    console.log('ReactRouterDOM:', typeof ReactRouterDOM);
    console.log('axios:', typeof axios);

    const { useState, useEffect } = React;
    const { BrowserRouter, Routes, Route, useNavigate, Navigate } = ReactRouterDOM;

    // Компонент регистрации
    const RegisterPage = () => {
      const navigate = useNavigate();
      const [form, setForm] = useState({
        first_name: '',
        last_name: '',
        phone: '',
        email: '',
        password: '',
        confirm_password: ''
      });
      const [error, setError] = useState('');

      const handleChange = (e) => {
        setForm({ ...form, [e.target.name]: e.target.value });
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        setError('');

        if (!form.first_name || !form.last_name || !form.phone || !form.email || !form.password || !form.confirm_password) {
          setError('Все поля обязательны');
          return;
        }

        if (form.password !== form.confirm_password) {
          setError('Пароли не совпадают');
          return;
        }

        try {
          await axios.post('http://localhost:8080/api/register', {
            first_name: form.first_name,
            last_name: form.last_name,
            phone: form.phone,
            email: form.email,
            password: form.password
          });
          navigate('/login');
        } catch (err) {
          console.log('Register error:', err.response);
          setError(err.response?.data?.message || 'Ошибка регистрации');
        }
      };

      return (
        <div className="flex items-center justify-center min-h-screen">
          <div className="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
            <h2 className="text-2xl font-bold mb-6 text-center">Регистрация</h2>
            {error && <p className="text-red-500 mb-4">{error}</p>}
            <form onSubmit={handleSubmit}>
              <div className="mb-4">
                <label className="block text-gray-700">Имя</label>
                <input
                  type="text"
                  name="first_name"
                  value={form.first_name}
                  onChange={handleChange}
                  className="w-full p-2 border rounded"
                  required
                />
              </div>
              <div className="mb-4">
                <label className="block text-gray-700">Фамилия</label>
                <input
                  type="text"
                  name="last_name"
                  value={form.last_name}
                  onChange={handleChange}
                  className="w-full p-2 border rounded"
                  required
                />
              </div>
              <div className="mb-4">
                <label className="block text-gray-700">Телефон</label>
                <input
                  type="tel"
                  name="phone"
                  value={form.phone}
                  onChange={handleChange}
                  className="w-full p-2 border rounded"
                  required
                />
              </div>
              <div className="mb-4">
                <label className="block text-gray-700">Email</label>
                <input
                  type="email"
                  name="email"
                  value={form.email}
                  onChange={handleChange}
                  className="w-full p-2 border rounded"
                  required
                />
              </div>
              <div className="mb-4">
                <label className="block text-gray-700">Пароль</label>
                <input
                  type="password"
                  name="password"
                  value={form.password}
                  onChange={handleChange}
                  className="w-full p-2 border rounded"
                  required
                />
              </div>
              <div className="mb-4">
                <label className="block text-gray-700">Повторите пароль</label>
                <input
                  type="password"
                  name="confirm_password"
                  value={form.confirm_password}
                  onChange={handleChange}
                  className="w-full p-2 border rounded"
                  required
                />
              </div>
              <button
                type="submit"
                className="w-full bg-blue-500 text-white p-2 rounded hover:bg-blue-600"
              >
                Зарегистрироваться
              </button>
            </form>
            <p className="mt-4 text-center">
              Уже есть аккаунт? <a href="/login" className="text-blue-500">Войти</a>
            </p>
          </div>
        </div>
      );
    };

    // Компонент входа
    const LoginPage = () => {
      const navigate = useNavigate();
      const [form, setForm] = useState({ email: '', password: '' });
      const [error, setError] = useState('');

      const handleChange = (e) => {
        setForm({ ...form, [e.target.name]: e.target.value });
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        setError('');

        if (!form.email || !form.password) {
          setError('Все поля обязательны');
          return;
        }

        try {
          await axios.post('http://localhost:8080/api/login', form, { withCredentials: true });
          navigate('/');
        } catch (err) {
          console.log('Login error:', err.response);
          setError(err.response?.data?.message || 'Ошибка входа');
        }
      };

      return (
        <div className="flex items-center justify-center min-h-screen">
          <div className="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
            <h2 className="text-2xl font-bold mb-6 text-center">Вход</h2>
            {error && <p className="text-red-500 mb-4">{error}</p>}
            <form onSubmit={handleSubmit}>
              <div className="mb-4">
                <label className="block text-gray-700">Email</label>
                <input
                  type="email"
                  name="email"
                  value={form.email}
                  onChange={handleChange}
                  className="w-full p-2 border rounded"
                  required
                />
              </div>
              <div className="mb-4">
                <label className="block text-gray-700">Пароль</label>
                <input
                  type="password"
                  name="password"
                  value={form.password}
                  onChange={handleChange}
                  className="w-full p-2 border rounded"
                  required
                />
              </div>
              <button
                type="submit"
                className="w-full bg-blue-500 text-white p-2 rounded hover:bg-blue-600"
              >
                Войти
              </button>
            </form>
            <p className="mt-4 text-center">
              Нет аккаунта? <a href="/register" className="text-blue-500">Зарегистрироваться</a>
            </p>
          </div>
        </div>
      );
    };

    // Компонент главной страницы
    const HomePage = () => {
      const [balance, setBalance] = useState(null);
      const [form, setForm] = useState({ email_receiver: '', amount_transaction: '' });
      const [error, setError] = useState('');
      const [success, setSuccess] = useState('');

      useEffect(() => {
        const fetchBalance = async () => {
          try {
            const response = await axios.get('http://localhost:8080/api/balance', { withCredentials: true });
            setBalance(response.data.user_balance);
          } catch (err) {
            console.log('Balance error:', err.response);
            setError(err.response?.data?.message || 'Ошибка загрузки баланса');
          }
        };
        fetchBalance();
      }, []);

      const handleChange = (e) => {
        setForm({ ...form, [e.target.name]: e.target.value });
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        setError('');
        setSuccess('');

        if (!form.email_receiver || !form.amount_transaction) {
          setError('Все поля обязательны');
          return;
        }

        const amount = parseInt(form.amount_transaction);
        if (isNaN(amount) || amount <= 0) {
          setError('Сумма должна быть положительным числом');
          return;
        }

        try {
          await axios.post('http://localhost:8080/api/transaction', {
            email_receiver: form.email_receiver,
            amount_transaction: amount
          }, { withCredentials: true });
          setSuccess('Перевод успешен');
          setForm({ email_receiver: '', amount_transaction: '' });
          const response = await axios.get('http://localhost:8080/api/balance', { withCredentials: true });
          setBalance(response.data.user_balance);
        } catch (err) {
          console.log('Transaction error:', err.response);
          setError(err.response?.data?.message || 'Ошибка перевода');
        }
      };

      return (
        <div className="container mx-auto p-4">
          <h1 className="text-3xl font-bold mb-6 text-center">Банк</h1>
          {error && <p className="text-red-500 mb-4 text-center">{error}</p>}
          {success && <p className="text-green-500 mb-4 text-center">{success}</p>}
          <div className="bg-white p-6 rounded-lg shadow-md mb-6">
            <h2 className="text-xl font-semibold mb-4">Ваш баланс</h2>
            {balance !== null ? (
              <p className="text-2xl">₽{balance}</p>
            ) : (
              <p>Загрузка...</p>
            )}
          </div>
          <div className="bg-white p-6 rounded-lg shadow-md">
            <h2 className="text-xl font-semibold mb-4">Перевод средств</h2>
            <form onSubmit={handleSubmit}>
              <div className="mb-4">
                <label className="block text-gray-700">Email получателя</label>
                <input
                  type="email"
                  name="email_receiver"
                  value={form.email_receiver}
                  onChange={handleChange}
                  className="w-full p-2 border rounded"
                  required
                />
              </div>
              <div className="mb-4">
                <label className="block text-gray-700">Сумма перевода</label>
                <input
                  type="number"
                  name="amount_transaction"
                  value={form.amount_transaction}
                  onChange={handleChange}
                  className="w-full p-2 border rounded"
                  required
                  min="1"
                />
              </div>
              <button
                type="submit"
                className="w-full bg-blue-500 text-white p-2 rounded hover:bg-blue-600"
              >
                Перевести
              </button>
            </form>
          </div>
        </div>
      );
    };

    // Защищённый маршрут
    const ProtectedRoute = ({ children }) => {
      const [isAuthenticated, setIsAuthenticated] = useState(null);

      useEffect(() => {
        const checkAuth = async () => {
          try {
            await axios.get('http://localhost:8080/api/balance', { withCredentials: true });
            setIsAuthenticated(true);
          } catch (err) {
            console.log('Auth error:', err.response);
            setIsAuthenticated(false);
          }
        };
        checkAuth();
      }, []);

      if (isAuthenticated === null) return <div>Загрузка...</div>;
      return isAuthenticated ? children : <Navigate to="/login" />;
    };

    // Главный компонент
    const App = () => {
      return (
        <BrowserRouter>
          <Routes>
            <Route path="/register" element={<RegisterPage />} />
            <Route path="/login" element={<LoginPage />} />
            <Route
              path="/"
              element={
                <ProtectedRoute>
                  <HomePage />
                </ProtectedRoute>
              }
            />
            <Route path="*" element={<Navigate to="/login" />} />
          </Routes>
        </BrowserRouter>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
